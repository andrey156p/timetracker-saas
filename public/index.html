<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeTracker SaaS Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .chrome-bg { background-color: #f1f3f4; }
        .chrome-tab-bar { background-color: #dee1e6; }
        .chrome-tab { 
            border-top-left-radius: 8px; 
            border-top-right-radius: 8px;
            cursor: pointer;
            position: relative;
            margin-right: 2px;
            transition: background-color 0.2s;
        }
        .chrome-tab.active { background-color: #ffffff; z-index: 10; font-weight: 500; }
        .chrome-tab.inactive { background-color: #dee1e6; }
        .chrome-tab.inactive:hover { background-color: #e8eaed; }
        .chrome-viewport { background-color: #ffffff; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
        button, a, select { user-select: none; -webkit-user-select: none; cursor: pointer; caret-color: transparent; }
        body { caret-color: transparent; }
        input, textarea { caret-color: auto; }
        input[type="checkbox"] { cursor: pointer; }
        
        /* Modern UI Overrides */
        button { transition: all 0.2s ease-in-out; }
        button.bg-blue-600 {
            background: linear-gradient(135deg, #3b82f6, #2563eb) !important;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2), 0 2px 4px -1px rgba(59, 130, 246, 0.1) !important;
            border: none !important;
        }
        button.bg-blue-600:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 8px -1px rgba(59, 130, 246, 0.3), 0 3px 6px -1px rgba(59, 130, 246, 0.2) !important;
        }
        table {
            border-collapse: separate !important;
            border-spacing: 0 !important;
            border: 1px solid #e5e7eb !important;
            border-radius: 0.5rem !important;
            overflow: hidden !important;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05) !important;
        }
        th {
            background-color: #f8fafc !important;
            text-transform: uppercase !important;
            font-size: 0.75rem !important;
            letter-spacing: 0.05em !important;
            font-weight: 600 !important;
            border-bottom: 1px solid #e5e7eb !important;
            padding: 0.75rem 1rem !important;
        }
        td {
            padding: 0.75rem 1rem !important;
            border-bottom: 1px solid #f3f4f6 !important;
        }
        tr:last-child td { border-bottom: none !important; }
        input:not([type="checkbox"]), select {
            border: 1px solid #d1d5db !important;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05) !important;
            border-radius: 0.5rem !important;
            transition: all 0.2s !important;
            padding: 0.5rem 0.75rem !important;
        }
        input:not([type="checkbox"]):focus, select:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2) !important;
            outline: none !important;
        }
    </style>
</head>
<body class="chrome-bg h-screen flex flex-col font-sans text-sm p-2 sm:p-4 text-gray-800">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="flex items-center justify-center h-full w-full">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden flex w-full max-w-5xl h-[600px] border border-gray-100">
            <!-- Left Info / Graphic (Hidden on mobile) -->
            <div class="hidden md:flex md:w-1/2 bg-gradient-to-br from-blue-50 to-blue-100 flex-col items-center justify-center p-10 relative">
                <div class="absolute top-8 left-8 text-blue-600 font-bold text-2xl tracking-tighter">TimeTracker <span class="text-gray-800">SaaS</span></div>
                <img src="hero.png" alt="Time Tracking Illustration" class="w-full max-w-sm drop-shadow-2xl rounded-2xl hover:scale-105 transition-transform duration-500">
                <p class="mt-8 text-center text-gray-600 font-medium text-lg leading-tight" data-i18n="login_desc">Учёт рабочего времени<br><span class="text-blue-600 font-bold">для вашего бизнеса</span></p>
            </div>
            
            <!-- Right Login Form -->
            <div class="w-full md:w-1/2 flex flex-col items-center justify-center p-10 sm:p-16 bg-white">
                <div class="w-full max-w-sm">
                    <div class="md:hidden text-blue-600 font-bold text-3xl mb-8 tracking-tighter text-center">TimeTracker SaaS</div>
                    <h2 class="text-3xl font-bold mb-2 text-gray-800" data-i18n="login_title">Добро пожаловать</h2>
                    <p class="text-gray-500 mb-8" data-i18n="login_subtitle">Введите данные для входа в систему</p>
                    
                    <div class="mb-5 relative">
                        <label class="block mb-2 text-sm font-semibold text-gray-700" data-i18n="username">Логин</label>
                        <input id="login-user" type="text" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm" placeholder="Логин">
                    </div>
                    <div class="mb-8 relative">
                        <label class="block mb-2 text-sm font-semibold text-gray-700" data-i18n="password">Пароль</label>
                        <div class="relative">
                            <input id="login-pass" type="password" class="w-full bg-gray-50 border border-gray-200 p-3 pr-10 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm" placeholder="••••••••">
                            <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-blue-600 transition-colors">
                                <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-0.5" data-i18n="login_btn">Войти в панель</button>
                    
                    <div id="login-error" class="text-red-500 mt-4 text-center text-sm font-medium hidden bg-red-50 p-2 rounded-lg border border-red-200"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- BROWSER APP INTERFACE -->
    <div id="app-screen" class="hidden flex-col h-full rounded-lg shadow-2xl overflow-hidden border border-gray-300">
        
        <!-- Tab Bar -->
        <div class="chrome-tab-bar flex px-2 pt-2 items-end select-none">
            <div id="tabs-container" class="flex"></div>
            
            <div class="ml-auto mb-1 mr-2 flex items-center space-x-3">
                <div class="flex space-x-2">
                    <button onclick="logout()" class="ml-4 bg-gray-200 text-gray-700 px-3 py-1 rounded text-xs font-bold transition hover:bg-gray-300" data-i18n="logout"></button>
                </div>
            </div>
        </div>

        <!-- Address Bar (Fake) -->
        <div class="bg-white px-3 py-2 flex items-center border-b shadow-sm">
            <div class="flex space-x-4 text-gray-500 mr-4">
                <svg class="w-4 h-4 cursor-pointer hover:text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                <svg class="w-4 h-4 cursor-pointer hover:text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                <svg class="w-4 h-4 cursor-pointer hover:text-gray-800" onclick="loadTab(currentTabId)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </div>
            <div class="flex-1 bg-gray-100 rounded-full px-4 py-1.5 flex items-center text-gray-700 text-xs font-mono">
                <svg class="w-3 h-3 mr-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                <span id="url-bar">https://app.timetracker.saas/dashboard</span>
            </div>
        </div>

        <!-- Viewport -->
        <div class="chrome-viewport p-6 flex-1 overflow-auto bg-gray-50 text-gray-800 relative">
            <div id="view-content" class="max-w-6xl mx-auto"></div>
        </div>
    </div>
    
    <script src="admin.js?v=2"></script>
</body>
</html>
