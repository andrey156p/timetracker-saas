<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TimeTracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body, html { overscroll-behavior: none; }
        .btn-press:active { transform: scale(0.95); }
        .disabled-btn { opacity: 0.5; filter: grayscale(100%); pointer-events: none; }
        button, a { user-select: none; -webkit-user-select: none; cursor: pointer; caret-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 h-[100dvh] w-screen flex flex-col font-sans text-gray-800 overflow-hidden">

    <div class="absolute top-4 right-4 flex space-x-3 z-50 bg-white/80 px-3 py-1 rounded-full shadow-sm backdrop-blur-sm" dir="ltr">
        <button onclick="setLang('ru')" class="text-xl opacity-50 hover:opacity-100 transition-opacity" id="lang-ru">🇷🇺</button>
        <button onclick="setLang('en')" class="text-xl opacity-50 hover:opacity-100 transition-opacity" id="lang-en">🇺🇸</button>
        <button onclick="setLang('he')" class="text-xl opacity-50 hover:opacity-100 transition-opacity" id="lang-he">🇮🇱</button>
        <button onclick="setLang('ar')" class="text-xl opacity-50 hover:opacity-100 transition-opacity" id="lang-ar">🇦🇪</button>
    </div>

    <div id="loader" class="flex-1 flex flex-col items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
        <p class="text-gray-500" data-i18n="loading">Загрузка профиля...</p>
    </div>

    <div id="error-screen" class="hidden flex-1 flex-col items-center justify-center p-6 text-center">
        <div class="text-red-500 text-6xl mb-4">⚠️</div>
        <h2 class="text-2xl font-bold mb-2" data-i18n="error_title">Ошибка доступа</h2>
        <p id="error-msg" class="text-gray-600">Ссылка недействительна.</p>
    </div>

    <div id="app-screen" class="hidden flex-1 flex-col p-4 w-full h-full max-w-md mx-auto relative pt-16">
        
        <div class="bg-white p-4 rounded-3xl shadow-sm mb-4 text-center shrink-0">
            <img src="app_icon.png" alt="App Icon" class="w-16 h-16 mx-auto mb-2 drop-shadow-md rounded-2xl">
            <p class="text-xs text-gray-400 uppercase tracking-widest font-bold mb-1" data-i18n="worker">РАБОТНИК</p>
            <h1 id="emp-name" class="text-2xl font-bold text-gray-800">Имя</h1>
            <p id="emp-id" class="text-sm text-gray-500 font-mono mt-1">ID</p>
            <p id="emp-foreman" class="text-sm text-gray-600 mt-1 font-medium bg-gray-100 rounded-full inline-block px-3 py-1">Руководитель: -</p>
            <br>
            <p id="emp-status" class="text-xs mt-2 inline-block px-3 py-1 rounded-full bg-blue-100 text-blue-800" data-i18n="status_ok">Геозона активна</p>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center space-y-4 mb-4">
            
            <div id="timer-box" class="hidden flex-col items-center mb-2">
                <p class="text-sm text-gray-500 uppercase font-bold tracking-wider" data-i18n="current_shift">Текущая смена</p>
                <div id="timer-display" class="text-5xl font-black text-gray-800 tracking-tighter">00:00:00</div>
            </div>

            <button id="btn-in" onclick="logTime('Вход')" class="btn-press flex-1 w-full max-h-56 rounded-[3rem] bg-gradient-to-br from-green-400 to-green-600 shadow-xl text-white text-4xl font-black border-8 border-green-200/50 transition-all select-none">
                <span data-i18n="btn_in">ВХОД</span>
            </button>
            <button id="btn-out" onclick="logTime('Выход')" class="btn-press flex-1 w-full max-h-56 rounded-[3rem] bg-gradient-to-br from-red-400 to-red-600 shadow-xl text-white text-4xl font-black border-8 border-red-200/50 transition-all disabled-btn select-none">
                <span data-i18n="btn_out">ВЫХОД</span>
            </button>
        </div>
        
        <button onclick="openReports()" id="btn-reports" class="shrink-0 w-max mx-auto text-sm text-gray-500 underline text-center pb-2 cursor-pointer transition hover:text-gray-800 select-none" data-i18n="report_btn">Мои Отчёты</button>

        <div id="action-status" class="hidden absolute bottom-4 left-4 right-4 bg-gray-800 text-white p-4 rounded-2xl text-center text-sm font-medium shadow-2xl transform translate-y-24 transition-transform duration-300 z-50">
            Сообщение
        </div>
    </div>

    <script>
        const API_URL = '/api';
        const urlParams = new URLSearchParams(window.location.search);
        const clientId = urlParams.get('cid');
        let empId = urlParams.get('empId') || localStorage.getItem('empId') || null;
        if (empId) localStorage.setItem('empId', empId);
        
        // Auto-detect language if not set
        let currentLang = localStorage.getItem('w_lang');
        if (!currentLang) {
            const browserLang = navigator.language.toLowerCase();
            if (browserLang.startsWith('he')) currentLang = 'he';
            else if (browserLang.startsWith('ar')) currentLang = 'ar';
            else if (browserLang.startsWith('ru') || browserLang.startsWith('uk') || browserLang.startsWith('be')) currentLang = 'ru';
            else currentLang = 'en';
        }
        
        let shiftStartTime = null;
        let timerInterval = null;

        const i18n = {
            ru: {
                loading: "Загрузка профиля...", error_title: "Ошибка доступа",
                worker: "РАБОТНИК", status_ok: "В зоне работы", status_mobile: "Передвижной режим",
                btn_in: "ВХОД", btn_out: "ВЫХОД", current_shift: "Время на смене",
                msg_gps_fetch: "Получение GPS...", msg_sending: "Отправка...",
                msg_in_success: "Смена начата! Удачи.", msg_out_success: "Смена завершена. Отработано: ",
                err_gps: "Нет доступа к GPS", err_network: "Ошибка сети",
                req_gps: "Пожалуйста, включите GPS для начала работы.", req_arrive: "Вам необходимо сначала прибыть на объект. Ваша геопозиция не совпадает.",
                report_btn: "Мои Отчёты", report_title: "Отчёт за месяц", report_total: "Всего часов:",
                report_night: "Ночные часы:", report_sat: "Часы в субботу:", report_over: "Сверхурочные:",
                report_dl: "Скачать Отчёт", close: "Закрыть", error: "Ошибка",
                remind_in: "Не забудьте нажать 'Вход' (смена скоро начнется)!", remind_out: "Не забудьте нажать 'Выход' (смена скоро закончится)!"
            },
            en: {
                loading: "Loading profile...", error_title: "Access Error",
                worker: "WORKER", status_ok: "In Work Zone", status_mobile: "Mobile Mode",
                btn_in: "CLOCK IN", btn_out: "CLOCK OUT", current_shift: "Shift Duration",
                msg_gps_fetch: "Fetching GPS...", msg_sending: "Sending...",
                msg_in_success: "Shift started! Good luck.", msg_out_success: "Shift ended. Total time: ",
                err_gps: "GPS access denied", err_network: "Network error",
                req_gps: "Please enable GPS to clock in.", req_arrive: "You must arrive at the workplace first. Your location does not match the site.",
                report_btn: "My Reports", report_title: "Monthly Report", report_total: "Total Hours:",
                report_night: "Night Hours:", report_sat: "Saturday Hours:", report_over: "Overtime:",
                report_dl: "Download Report", close: "Close", error: "Error",
                remind_in: "Don't forget to Clock In (shift starts soon)!", remind_out: "Don't forget to Clock Out (shift ends soon)!"
            },
            he: {
                loading: "טוען פרופיל...", error_title: "שגיאת גישה",
                worker: "עובד", status_ok: "באזור העבודה", status_mobile: "מצב נייד",
                btn_in: "כניסה", btn_out: "יציאה", current_shift: "משך משמרת",
                msg_gps_fetch: "מאתר מיקום...", msg_sending: "שולח...",
                msg_in_success: "משמרת התחילה! בהצלחה.", msg_out_success: "משמרת הסתיימה. זמן כולל: ",
                err_gps: "גישה למיקום נדחתה", err_network: "שגיאת רשת",
                req_gps: "אנא אפשר שירותי מיקום כדי להיכנס למשמרת.", req_arrive: "עליך להגיע לאתר העבודה תחילה. המיקום שלך אינו תואם.",
                report_btn: "הדוחות שלי", report_title: "דוח חודשי", report_total: "סך הכל שעות:",
                report_night: "שעות לילה:", report_sat: "שעות שבת:", report_over: "שעות נוספות:",
                report_dl: "הורד דוח", close: "סגור", error: "שגיאה",
                remind_in: "אל תשכח ללחוץ 'כניסה' (המשמרת מתחילה בקרוב)!", remind_out: "אל תשכח ללחוץ 'יציאה' (המשמרת מסתיימת בקרוב)!"
            },
            ar: {
                loading: "جاري تحميل الملف الشخصي...", error_title: "خطأ في الوصول",
                worker: "عامل", status_ok: "في منطقة العمل", status_mobile: "وضع التنقل",
                btn_in: "دخول", btn_out: "خروج", current_shift: "مدة الوردية",
                msg_gps_fetch: "الحصول على GPS...", msg_sending: "إرسال...",
                msg_in_success: "بدأت الوردية! حظا موفقا.", msg_out_success: "انتهت الوردية. الوقت الإجمالي: ",
                err_gps: "تم رفض الوصول إلى GPS", err_network: "خطأ في الشبكة",
                req_gps: "يرجى تمكين GPS لبدء العمل.", req_arrive: "يجب أن تصل إلى موقع العمل أولاً. موقعك لا يطابق الموقع المخصص.",
                report_btn: "تقاريري", report_title: "تقرير شهري", report_total: "إجمالي الساعات:",
                report_night: "ساعات ليلية:", report_sat: "ساعات السبت:", report_over: "عمل إضافي:",
                report_dl: "تحميل التقرير", close: "إغلاق", error: "خطأ",
                remind_in: "لا تنس النقر على 'دخول' (تبدأ الوردية قريباً)!", remind_out: "لا تنس النقر على 'خروج' (تنتهي الوردية قريباً)!"
            }
        };

        let currentForemanName = '';
        let workerShifts = null;
        let isClockedInGlobal = false;
        let shiftCheckerInterval = null;
        let strictGpsEnabled = false;
        let geofenceData = null;
        let watchPosId = null;
        let isPausedGps = false;
        let notifiedTimes = {}; // Store times we already notified for today

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('w_lang', lang);
            document.documentElement.dir = (lang === 'he' || lang === 'ar') ? 'rtl' : 'ltr';
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(i18n[lang][key]) el.textContent = i18n[lang][key];
            });

            if (currentForemanName) {
                const fLabels = { ru: 'Руководитель', en: 'Manager', he: 'מנהל עבודה', ar: 'مدير' };
                document.getElementById('emp-foreman').textContent = (fLabels[currentLang] || 'Manager') + ': ' + currentForemanName;
            }

            document.getElementById('lang-ru').style.opacity = lang === 'ru' ? '1' : '0.5';
            document.getElementById('lang-en').style.opacity = lang === 'en' ? '1' : '0.5';
            document.getElementById('lang-he').style.opacity = lang === 'he' ? '1' : '0.5';
            document.getElementById('lang-ar').style.opacity = lang === 'ar' ? '1' : '0.5';
        }

        async function init() {
            setLang(currentLang);
            if (!empId) {
                empId = prompt("Enter ID / Введите ваш ID (телефон):");
                if (!empId) return showError("ID required");
                localStorage.setItem('empId', empId);
            }

            try {
                const res = await fetch(`${API_URL}/worker/geofence/${empId}`);
                const r = await res.json();
                
                if (r.success) {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('app-screen').classList.add('flex');
                    document.getElementById('emp-name').textContent = r.name;
                    document.getElementById('emp-id').textContent = 'ID: ' + r.id;
                    
                    currentForemanName = r.foremanName;
                    const fLabels = { ru: 'Руководитель', en: 'Manager', he: 'מנהל עבודה', ar: 'مدير' };
                    document.getElementById('emp-foreman').textContent = (fLabels[currentLang] || 'Manager') + ': ' + currentForemanName;
                    
                    if (r.isMobile) document.getElementById('emp-status').textContent = i18n[currentLang].status_mobile;
                    else document.getElementById('emp-status').textContent = i18n[currentLang].status_ok;

                    strictGpsEnabled = r.strictGps;
                    geofenceData = { lat: r.lat, lng: r.lng, radius: r.radius };

                    // Setup state
                    workerShifts = r.shifts || {};
                    if (r.lastLog && (r.lastLog.action === 'Вход' || r.lastLog.action === 'Авто-Продолжение' || r.lastLog.action === 'Авто-Пауза')) {
                        if (r.lastLog.action === 'Авто-Пауза') {
                            isPausedGps = true;
                            document.getElementById('app-screen').classList.add('bg-yellow-50');
                            document.getElementById('emp-status').textContent = 'ВНЕ ЗОНЫ (ПАУЗА)';
                            document.getElementById('emp-status').classList.replace('text-green-600', 'text-yellow-600');
                            document.getElementById('timer-display').style.color = 'orange';
                        }
                        shiftStartTime = new Date(r.lastLog.time);
                        setBtnState(true); // true = clocked in
                    } else {
                        shiftStartTime = null;
                        setBtnState(false);
                    }
                    
                    startShiftChecker();
                    subscribePush();

                } else {
                    localStorage.removeItem('empId');
                    showError(r.error || "Работник не найден");
                }
            } catch (e) {
                showError(i18n[currentLang].err_network);
            }
        }

        async function flushQueue() {
            let queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
            if (queue.length === 0) return;
            
            // Try to send offline logs
            const stillOffline = [];
            for (let item of queue) {
                try {
                    const res = await fetch(`${API_URL}/worker/log`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ empId: item.empId, action: item.action, lat: item.lat, lng: item.lng, timestamp: item.timestamp })
                    });
                    const r = await res.json();
                    if (!r.success && r.error === 'Вы вне зоны объекта!') {
                        // Was out of zone, ignore it or show error? Best to ignore failed offline logs silently to not block queue
                    }
                } catch(e) {
                    stillOffline.push(item);
                }
            }
            if (queue.length !== stillOffline.length) {
                showToast("Офлайн данные успешно отправлены на сервер", false);
            }
            localStorage.setItem('offlineQueue', JSON.stringify(stillOffline));
        }

        window.addEventListener('online', flushQueue);
        setInterval(flushQueue, 60000); // Also check every minute

        const publicVapidKey = 'BLyPnNanMfF_PrfxgJeRAhASt2Yap9b65zJCtxo40i-9JFylQvzgO8KFwzxFVBLot7d20WrB7gnHspXi7G7kMy8';
        
        async function subscribePush() {
            if ('serviceWorker' in navigator && 'PushManager' in window) {
                try {
                    const register = await navigator.serviceWorker.register('/sw.js');
                    const subscription = await register.pushManager.subscribe({
                        userVisibleOnly: true,
                        applicationServerKey: urlBase64ToUint8Array(publicVapidKey)
                    });
                    
                    await fetch(`${API_URL}/worker/subscribe`, {
                        method: 'POST',
                        body: JSON.stringify({ empId, subscription }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                } catch(e) {
                    console.error('Push registration failed', e);
                }
            }
        }
        
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        function setBtnState(isClockedIn) {
            isClockedInGlobal = isClockedIn;
            const btnIn = document.getElementById('btn-in');
            const btnOut = document.getElementById('btn-out');
            const timerBox = document.getElementById('timer-box');
            
            if (isClockedIn) {
                btnIn.classList.add('disabled-btn');
                btnOut.classList.remove('disabled-btn');
                timerBox.classList.remove('hidden');
                timerBox.classList.add('flex');
                startTimer();
                if (strictGpsEnabled && !geofenceData.isMobile) startGpsWatch();
            } else {
                btnIn.classList.remove('disabled-btn');
                btnOut.classList.add('disabled-btn');
                timerBox.classList.remove('flex');
                timerBox.classList.add('hidden');
                stopTimer();
                stopGpsWatch();
            }
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!shiftStartTime) return;
                const diff = Math.floor((new Date() - shiftStartTime) / 1000);
                const h = String(Math.floor(diff / 3600)).padStart(2, '0');
                const m = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
                const s = String(diff % 60).padStart(2, '0');
                document.getElementById('timer-display').textContent = `${h}:${m}:${s}`;
            }, 1000);
        }

        function stopTimer() {
            if(timerInterval) clearInterval(timerInterval);
            document.getElementById('timer-display').textContent = `00:00:00`;
        }

        function formatDuration(ms) {
            const diff = Math.floor(ms / 1000);
            const h = Math.floor(diff / 3600);
            const m = Math.floor((diff % 3600) / 60);
            return `${h}h ${m}m`;
        }

        function formatHM(decimalHours) {
            if(!decimalHours) return "00:00";
            const h = Math.floor(decimalHours);
            const m = Math.round((decimalHours - h) * 60);
            return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        }

        function showError(msg) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('error-screen').classList.remove('hidden');
            document.getElementById('error-screen').classList.add('flex');
            document.getElementById('error-msg').textContent = msg;
        }

        function showToast(msg, isError = false) {
            const el = document.getElementById('action-status');
            el.textContent = msg;
            el.className = `absolute bottom-4 left-4 right-4 text-white p-4 rounded-2xl text-center text-sm font-medium shadow-2xl transform transition-transform duration-300 z-50 ${isError ? 'bg-red-600' : 'bg-gray-800'}`;
            el.style.transform = 'translateY(0)';
            el.classList.remove('hidden');
            setTimeout(() => {
                el.style.transform = 'translateY(150%)';
                setTimeout(() => el.classList.add('hidden'), 300);
            }, 4000);
        }

        function getGPS() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) return reject(i18n[currentLang].err_gps);
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    err => reject(i18n[currentLang].err_gps),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }

        function playNotificationSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(1, ctx.currentTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch (e) { console.error("Audio blocked", e); }
        }

        function subtractMinutes(timeStr, mins) {
            if(!timeStr) return null;
            let [h, m] = timeStr.split(':').map(Number);
            let date = new Date();
            date.setHours(h, m, 0, 0);
            date.setMinutes(date.getMinutes() - mins);
            return `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
        }

        
        function getDist(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lon1 || !lat2 || !lon2) return 0;
            const R = 6371e3;
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function startGpsWatch() {
            if (!navigator.geolocation || watchPosId !== null) return;
            watchPosId = navigator.geolocation.watchPosition(
                async (pos) => {
                    if (!geofenceData || !geofenceData.lat || !geofenceData.lng) return;
                    const dist = getDist(geofenceData.lat, geofenceData.lng, pos.coords.latitude, pos.coords.longitude);
                    
                    if (dist > geofenceData.radius) {
                        if (!isPausedGps) {
                            isPausedGps = true;
                            document.getElementById('app-screen').classList.add('bg-yellow-50');
                            document.getElementById('emp-status').textContent = 'ВНЕ ЗОНЫ (ПАУЗА)';
                            document.getElementById('emp-status').classList.remove('text-green-600');
                            document.getElementById('emp-status').classList.add('text-yellow-600');
                            document.getElementById('timer-display').style.color = 'orange';
                            
                            try {
                                await fetch(API_URL + '/worker/gps-pause', {
                                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ empId: localStorage.getItem('empId'), lat: pos.coords.latitude, lng: pos.coords.longitude })
                                });
                            } catch(e) {}
                        }
                    } else {
                        if (isPausedGps) {
                            isPausedGps = false;
                            document.getElementById('app-screen').classList.remove('bg-yellow-50');
                            document.getElementById('emp-status').textContent = i18n[currentLang].status_ok;
                            document.getElementById('emp-status').classList.remove('text-yellow-600');
                            document.getElementById('emp-status').classList.add('text-green-600');
                            document.getElementById('timer-display').style.color = '';

                            try {
                                await fetch(API_URL + '/worker/gps-resume', {
                                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ empId: localStorage.getItem('empId'), lat: pos.coords.latitude, lng: pos.coords.longitude })
                                });
                            } catch(e) {}
                        }
                    }
                },
                (err) => { console.error('GPS Watch Error', err); },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        }

        function stopGpsWatch() {
            if (watchPosId !== null) {
                navigator.geolocation.clearWatch(watchPosId);
                watchPosId = null;
            }
            if (isPausedGps) {
                isPausedGps = false;
                document.getElementById('app-screen').classList.remove('bg-yellow-50');
                document.getElementById('emp-status').textContent = i18n[currentLang].status_ok;
                document.getElementById('emp-status').classList.remove('text-yellow-600');
                document.getElementById('emp-status').classList.add('text-green-600');
                document.getElementById('timer-display').style.color = '';
            }
        }

        function startShiftChecker() {
            if(shiftCheckerInterval) clearInterval(shiftCheckerInterval);
            shiftCheckerInterval = setInterval(() => {
                if(!workerShifts) return;
                const now = new Date();
                const curTimeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                
                // Clear notifiedTimes at midnight
                if(curTimeStr === "00:00") notifiedTimes = {};

                const starts = [workerShifts.mS, workerShifts.eS, workerShifts.nS].filter(Boolean);
                const ends = [workerShifts.mE, workerShifts.eE, workerShifts.nE].filter(Boolean);

                if (!isClockedInGlobal) {
                    // Check starts
                    starts.forEach(time => {
                        const remindTime = subtractMinutes(time, 5);
                        if (curTimeStr === remindTime && !notifiedTimes['in_'+time]) {
                            notifiedTimes['in_'+time] = true;
                            playNotificationSound();
                            Swal.fire({ toast: true, position: 'top', icon: 'info', title: i18n[currentLang].remind_in, showConfirmButton: false, timer: 10000 });
                        }
                    });
                } else {
                    // Check ends
                    ends.forEach(time => {
                        const remindTime = subtractMinutes(time, 5);
                        if (curTimeStr === remindTime && !notifiedTimes['out_'+time]) {
                            notifiedTimes['out_'+time] = true;
                            playNotificationSound();
                            Swal.fire({ toast: true, position: 'top', icon: 'info', title: i18n[currentLang].remind_out, showConfirmButton: false, timer: 10000 });
                        }
                    });
                }
            }, 60000); // Check every minute
        }

        async function logTime(action) {
            // Prevent double taps
            if (action === 'Вход' && shiftStartTime) return;
            if (action === 'Выход' && !shiftStartTime) return;

            Swal.fire({
                title: i18n[currentLang].msg_gps_fetch,
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                let coords = { lat: 0, lng: 0 };
                try { 
                    coords = await getGPS(); 
                } catch(e) {
                    Swal.fire({ icon: 'warning', title: 'GPS', text: i18n[currentLang].req_gps, confirmButtonColor: '#3b82f6' });
                    return;
                }

                Swal.update({ title: i18n[currentLang].msg_sending });
                
                const res = await fetch(`${API_URL}/worker/log`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ empId, action, lat: coords.lat, lng: coords.lng })
                });
                const r = await res.json();
                
                if (r.success) {
                    if (action === 'Вход') {
                        shiftStartTime = new Date();
                        setBtnState(true);
                        Swal.fire({ icon: 'success', title: 'OK', text: i18n[currentLang].msg_in_success, timer: 2000, showConfirmButton: false });
                    } else {
                        const duration = formatDuration(new Date() - shiftStartTime);
                        shiftStartTime = null;
                        setBtnState(false);
                        Swal.fire({ icon: 'success', title: 'OK', text: i18n[currentLang].msg_out_success + duration, timer: 3000, showConfirmButton: false });
                    }
                } else {
                    if (r.error === 'Вы вне зоны объекта!') {
                        Swal.fire({ icon: 'error', title: i18n[currentLang].error, text: i18n[currentLang].req_arrive, confirmButtonColor: '#ef4444' });
                    } else {
                        Swal.fire({ icon: 'error', title: i18n[currentLang].error, text: r.error, confirmButtonColor: '#ef4444' });
                    }
                }
            } catch (e) {
                // Офлайн режим
                let queue = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
                queue.push({ empId, action, lat: coords.lat, lng: coords.lng, timestamp: new Date().toISOString() });
                localStorage.setItem('offlineQueue', JSON.stringify(queue));

                if (action === 'Вход') {
                    shiftStartTime = new Date();
                    setBtnState(true);
                } else {
                    shiftStartTime = null;
                    setBtnState(false);
                }
                Swal.fire({ icon: 'info', title: 'Офлайн', text: 'Нет интернета. Данные сохранены локально и будут отправлены при подключении.', confirmButtonColor: '#3b82f6' });
            }
        }

        async function openReports() {
            const month = new Date().toISOString().slice(0, 7);
            const btn = document.getElementById('btn-reports');
            const originalText = btn.textContent;
            btn.textContent = i18n[currentLang].loading;
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/worker/report/${empId}?month=${month}`);
                const r = await res.json();
                btn.textContent = originalText;
                btn.disabled = false;
                if (r.success) {
                    let html = `
                        <div class="text-left text-sm space-y-3 mt-4 text-gray-700" dir="${document.documentElement.dir}">
                            <div class="flex justify-between border-b border-gray-200 pb-2"><span>${i18n[currentLang].report_total}</span> <strong class="text-lg">${formatHM(r.totalHours)}</strong></div>
                            <div class="flex justify-between border-b border-gray-200 pb-2"><span>${i18n[currentLang].report_over}</span> <strong class="text-blue-600">${formatHM(r.overtimeHours)}</strong></div>
                            <div class="flex justify-between border-b border-gray-200 pb-2"><span>${i18n[currentLang].report_sat}</span> <strong class="text-purple-600">${formatHM(r.saturdayHours)}</strong></div>
                            <div class="flex justify-between border-b border-gray-200 pb-2"><span>${i18n[currentLang].report_night}</span> <strong class="text-indigo-600">${formatHM(r.nightHours)}</strong></div>
                        </div>
                    `;
                    Swal.fire({
                        title: i18n[currentLang].report_title + " (" + month + ")",
                        html: html,
                        showCancelButton: true,
                        confirmButtonText: i18n[currentLang].report_dl,
                        cancelButtonText: i18n[currentLang].close,
                        confirmButtonColor: '#10b981',
                        cancelButtonColor: '#6b7280'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            downloadReportCSV(r.dailyData, month, r);
                        }
                    });
                } else {
                    Swal.fire({ icon: 'error', title: i18n[currentLang].error, text: r.error });
                }
            } catch(e) {
                btn.textContent = originalText;
                btn.disabled = false;
                Swal.fire({ icon: 'error', title: i18n[currentLang].error, text: i18n[currentLang].err_network });
            }
        }

        function downloadReportCSV(dailyData, month, totals) {
            let html = `
            <html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
            <head><meta charset="utf-8" /></head>
            <body>
                <table border="1">
                    <tr><th>Date</th><th>Hours</th></tr>`;
            for (let d in dailyData) {
                html += `<tr><td>${d}</td><td>${formatHM(dailyData[d])}</td></tr>`;
            }
            html += `<tr><td></td><td></td></tr>`;
            html += `<tr><td><b>${i18n[currentLang].report_total}</b></td><td>${formatHM(totals.totalHours)}</td></tr>`;
            html += `<tr><td><b>${i18n[currentLang].report_over}</b></td><td>${formatHM(totals.overtimeHours)}</td></tr>`;
            html += `<tr><td><b>${i18n[currentLang].report_sat}</b></td><td>${formatHM(totals.saturdayHours)}</td></tr>`;
            html += `<tr><td><b>${i18n[currentLang].report_night}</b></td><td>${formatHM(totals.nightHours)}</td></tr>`;
            html += `</table></body></html>`;

            const blob = new Blob(["\uFEFF", html], { type: 'application/vnd.ms-excel;charset=utf-8' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `Report_${empId}_${month}.xls`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
